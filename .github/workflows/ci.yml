name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:

jobs:
  # ADR #16 gate: both halves must agree with docs/normalize-fixtures.json.
  # Either job failing = drift between FE and BE normalize logic = block merge.

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: test (includes normalize fixtures)
        run: npm run test

  backend:
    name: backend (junit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: test (includes NormalizeUtilTest fixtures)
        run: ./gradlew test --no-daemon
      - name: upload junit reports (diagnostic — A1 close)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit-reports
          path: |
            backend/build/reports/tests/test/
            backend/build/test-results/test/
          retention-days: 7

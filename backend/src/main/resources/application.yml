spring:
  application:
    name: ibizdrive-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/ibizdrive
    username: ibizdrive
    password: dev_password_only_change_in_real_envs
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ADR #12 + 사용자 명시: Spring Session JDBC (Redis 아님)
  # ADR #20 — idle 30분 sliding은 본 timeout이 진실 출처 (Spring Session JDBC가
  # 매 요청 lastAccessedTime 갱신, 30분 무활동 시 자동 invalidate).
  # absolute 8h 한도는 SessionValidityFilter가 진실 출처 (auth/SessionValidityFilter.java, ADR #20).
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never  # Flyway가 schema 관리
      table-name: SPRING_SESSION
    timeout: PT30M

  servlet:
    # A15 (ADR #36 가칭, ADR #13 재정정): MVP는 단일-POST multipart. tus는 v1.x 이월.
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB
      file-size-threshold: 1MB    # 디스크 spill 임계값 — 메모리 보호

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false       # dev only — staging/prod에서 true
        same-site: lax
        name: SESSION
  # MVP-fix (mvp-qa-security Phase 3): production stacktrace leak 방지.
  # Spring Boot default(`on_param`)은 ?trace=true 쿼리에 stacktrace 노출 가능.
  # 운영에서는 `never`로 강제하여 generic 5xx만 응답 (docs/03 §1.3 Information Disclosure).
  error:
    include-stacktrace: never
    include-message: on-param
    include-binding-errors: on-param

# 스케줄 잡 — 운영 기본 비활성, staging/prod에서 명시적 활성화 후 투입.
# SchedulingConfig가 @EnableScheduling을 무조건 활성화하고 개별 잡이 enabled 게이트(이중 가드).
app:
  # A7 hard purge (docs/04 §13 purge.expired, ADR #31).
  purge:
    enabled: false
    max-per-run: 10000
    cron: "0 0 0 * * *"     # 매일 자정
    zone: Asia/Seoul
  # SHARE_EXPIRED cron (docs/04 §13, ADR #34 backlog closure).
  # shares.expires_at <= NOW() AND revoked_at IS NULL row를 자동 만료하고 share.expired audit 기록.
  share:
    expiration:
      enabled: false
      batch-size: 200
      cron: "0 */5 * * * *" # 매 5분
      zone: Asia/Seoul
  # PERMISSION_EXPIRED cron (docs/04 §13, permissions-expired-cron).
  # permissions.expires_at <= NOW() row를 hard delete + permission.expired audit 기록.
  # 평가(findEffective)는 이미 만료 row를 무시하므로 cron의 역할은 DB cleanup + audit trail.
  permission:
    expiration:
      enabled: false
      batch-size: 200
      cron: "0 */5 * * * *" # 매 5분
      zone: Asia/Seoul
  # A15 backlog — storage orphan cleanup (트랜잭션 실패·hard purge 잔존 객체 일일 정리).
  # files/file_versions JOIN으로 live storage_key set을 만들고, storage walk와 diff하여 삭제.
  # mtime이 NOW-graceHours 이전인 객체만 후보 (in-flight 업로드 race 회피).
  storage:
    orphan-cleanup:
      enabled: false
      cron: "0 0 1 * * *"   # 매일 새벽 1시 (hard purge 자정 직후)
      zone: Asia/Seoul
      max-per-run: 10000
      grace-hours: 24
      batch-size: 200
  # a1.5 이메일 — 발신자 주소 + 재설정 링크 base URL.
  # dev는 ConsoleEmailService가 활성화되어 SMTP 미설정으로도 부팅 가능.
  # prod는 application-prod.yml이 spring.mail.* 환경변수를 추가 주입.
  email:
    from: noreply@ibizdrive.local
  app-url: http://localhost:3000

ibizdrive:
  storage:
    # A15 (ADR #36 가칭) — MVP는 type=local만 동작. s3는 v1.x.
    type: local
    local:
      root: ./uploads
    s3:
      endpoint: http://localhost:9000
      region: us-east-1
      bucket: ibizdrive-files
      access-key: minioadmin
      secret-key: minioadmin
      path-style-access: true
  cors:
    allowed-origins:
      - http://localhost:3000

logging:
  level:
    com.ibizdrive: INFO
    org.springframework.security: INFO

spring:
  application:
    name: ibizdrive-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/ibizdrive
    username: ibizdrive
    password: dev_password_only_change_in_real_envs
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ADR #12 + 사용자 명시: Spring Session JDBC (Redis 아님)
  # ADR #20 — idle 30분 sliding은 본 timeout이 진실 출처 (Spring Session JDBC가
  # 매 요청 lastAccessedTime 갱신, 30분 무활동 시 자동 invalidate).
  # absolute 8h 한도는 SessionValidityFilter가 진실 출처 (auth/SessionValidityFilter.java, ADR #20).
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never  # Flyway가 schema 관리
      table-name: SPRING_SESSION
    timeout: PT30M

  servlet:
    multipart:
      enabled: false  # tus 사용 (A4)

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false       # dev only — staging/prod에서 true
        same-site: lax
        name: SESSION

# A7 hard purge job (docs/04 §13 purge.expired, ADR #31).
# 운영 기본 비활성 — staging/prod에서 명시적으로 enabled=true 설정 후 투입.
# enabled=false면 SchedulingConfig + HardPurgeJob 빈 모두 미등록 (cron 트리거 자체 부재).
app:
  purge:
    enabled: false
    max-per-run: 10000
    cron: "0 0 0 * * *"   # 매일 자정
    zone: Asia/Seoul

ibizdrive:
  storage:
    s3:
      endpoint: http://localhost:9000
      region: us-east-1
      bucket: ibizdrive-files
      access-key: minioadmin
      secret-key: minioadmin
      path-style-access: true
  cors:
    allowed-origins:
      - http://localhost:3000

logging:
  level:
    com.ibizdrive: INFO
    org.springframework.security: INFO

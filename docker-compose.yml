# Local development infra for IbizDrive backend.
# - postgres : DB + Spring Session JDBC store (ADR #11/#12)
# - minio    : S3-compatible blob storage for tus uploads (ADR #13)
# No Redis: sessions live in Postgres (ADR #12). No Redis: realtime is SSE in-process (ADR #14).

services:
  postgres:
    image: postgres:15-alpine
    container_name: ibizdrive-postgres
    environment:
      POSTGRES_DB: ibizdrive
      POSTGRES_USER: ibizdrive
      POSTGRES_PASSWORD: dev_password_only_change_in_real_envs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibizdrive -d ibizdrive"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: ibizdrive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the bucket so the backend can start cleanly.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: ibizdrive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ibizdrive-files &&
      echo 'bucket ready'
      "

volumes:
  postgres-data:
  minio-data:
